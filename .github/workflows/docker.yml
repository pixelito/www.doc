name: Publish Docker Images

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKERHUB_REPO: pixelito/www.doc

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry (GHCR)
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-app
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push App Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/app/Dockerfile
          target: app
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-app:${{ github.event.release.tag_name || 'latest' }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-app:latest
            ${{ env.DOCKERHUB_REPO }}-app:${{ github.event.release.tag_name || 'latest' }}
            ${{ env.DOCKERHUB_REPO }}-app:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/app/Dockerfile
          target: web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:${{ github.event.release.tag_name || 'latest' }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web:latest
            ${{ env.DOCKERHUB_REPO }}-web:${{ github.event.release.tag_name || 'latest' }}
            ${{ env.DOCKERHUB_REPO }}-web:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub Description for App
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_REPO }}-app
          readme-filepath: ./README.md

      - name: Update Docker Hub Description for Web
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_REPO }}-web
          readme-filepath: ./README.md
