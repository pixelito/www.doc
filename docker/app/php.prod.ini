; Production PHP tuning. Opcache on, validation off (code is immutable in the image).
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0

expose_php=0
memory_limit=256M

; Backup archives (imported via the admin Backups tab) are the largest legitimate
; upload — well beyond the 10 MB asset ceiling — so allow up to ~1 GB. Uploads are
; buffered to disk (not memory) and the importer streams them, so memory_limit is
; unaffected. nginx only lets bodies this large through the import route
; (see docker/nginx/default.conf); operators with bigger instances can raise both.
upload_max_filesize=1024M
post_max_size=1088M
