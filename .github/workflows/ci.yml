name: CI

on:
  push:
    branches: [master, develop]
  pull_request:

jobs:
  tests:
    name: Pest + build
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: wwwdoc_test
          POSTGRES_USER: wwwdoc
          POSTGRES_PASSWORD: wwwdoc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U wwwdoc"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    steps:
      - uses: actions/checkout@v5

      # phpunit.xml forces DB_HOST=db / REDIS_HOST=redis; point those names at
      # the service containers published on localhost.
      - name: Map service hostnames
        run: echo "127.0.0.1 db redis" | sudo tee -a /etc/hosts

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_pgsql, pgsql, zip, intl, bcmath, redis, mbstring
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # Feature tests render Inertia pages through the root Blade template, which
      # needs the Vite manifest — build the assets before running them.
      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Run tests
        run: php artisan test

  e2e:
    name: Docker E2E & Worker Permissions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Prepare environment
        run: |
          cp .env.example .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=secret/' .env

      - name: Build and start Docker stack
        run: |
          # Swap image pulls for local builds to test the current commit
          sed -i 's|image: ghcr.io/pixelito/www.doc-app:latest|build: { context: ., dockerfile: docker/app/Dockerfile, target: app }|' docker-compose.prod.yml
          sed -i 's|image: ghcr.io/pixelito/www.doc-web:latest|build: { context: ., dockerfile: docker/app/Dockerfile, target: web }|' docker-compose.prod.yml
          
          docker compose -f docker-compose.prod.yml build
          # Start app container first to safely initialize the shared volume and avoid race conditions
          docker compose -f docker-compose.prod.yml up -d app
          docker compose -f docker-compose.prod.yml up -d

      - name: Wait for services to boot
        run: sleep 15

      - name: Verify queue worker user
        run: |
          # Assert that the actual PHP queue worker process runs as www-data (UID 33).
          # (Note: The `php` image does not have `ps` installed, so we check /proc directly)
          if ! docker compose -f docker-compose.prod.yml exec -T worker sh -c "grep -h '^Uid:' /proc/[0-9]*/status | awk '{print \$2}' | grep -q '^33$'"; then
            echo "Error: Queue worker process is NOT running as www-data (UID 33)!"
            exit 1
          fi
          echo "Success: Queue worker is running as www-data."

      - name: Run health check
        run: |
          # Check that the web server is up and correctly proxies to the app container
          curl -f http://localhost:8080/ || exit 1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          APP_URL: http://localhost:8080
