server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 16m;

    # Don't let a browser MIME-sniff a user-uploaded asset into something
    # executable; pairs with the server-side image allow-list.
    add_header X-Content-Type-Options "nosniff" always;

    # Built Vite assets — long cache, they're content-hashed.
    location /build/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Uploaded assets live behind the public/storage symlink (a shared volume).
    location /storage/ {
        access_log off;
        expires 30d;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
    }

    # Don't serve dotfiles (.env, .git, …).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
