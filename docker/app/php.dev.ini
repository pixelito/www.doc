; Dev upload limits — match production (docker/app/php.prod.ini) so importing a
; real backup archive works under `php artisan serve` too. Mounted into the CLI
; SAPI's conf.d, so both artisan and the php -S request handler it spawns read it
; (a `php -d` flag on the command would NOT reach that subprocess).
upload_max_filesize=1024M
post_max_size=1088M
