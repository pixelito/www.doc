name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tests:
    name: Pest + build
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: wwwdoc_test
          POSTGRES_USER: wwwdoc
          POSTGRES_PASSWORD: wwwdoc
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U wwwdoc"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10

    steps:
      - uses: actions/checkout@v5

      # phpunit.xml forces DB_HOST=db / REDIS_HOST=redis; point those names at
      # the service containers published on localhost.
      - name: Map service hostnames
        run: echo "127.0.0.1 db redis" | sudo tee -a /etc/hosts

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_pgsql, pgsql, zip, intl, bcmath, redis, mbstring
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # Feature tests render Inertia pages through the root Blade template, which
      # needs the Vite manifest — build the assets before running them.
      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Run tests
        run: php artisan test
