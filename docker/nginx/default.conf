server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 16m;

    # Don't let a browser MIME-sniff a user-uploaded asset into something
    # executable; pairs with the server-side image allow-list.
    add_header X-Content-Type-Options "nosniff" always;

    # Built Vite assets — long cache, they're content-hashed.
    location /build/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Uploaded assets live behind the public/storage symlink (a shared volume).
    location /storage/ {
        access_log off;
        expires 30d;
        try_files $uri =404;
    }

    # Importing a backup archive is the largest body we accept — the global 16m
    # cap stays in force everywhere else. Keep this in step with post_max_size
    # in docker/app/php.prod.ini.
    location = /admin/backups/import {
        client_max_body_size 1088m;
        try_files $uri /index.php?$query_string;
    }

    # Document imports (DOCX/PDF) accept up to 50 MB. Keep this in step with the
    # max:51200 validation rule in ImportController and the "max 50 MB" hint on
    # the Import page.
    location ~ ^/workspaces/\d+/imports$ {
        client_max_body_size 50m;
        try_files $uri /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        resolver 127.0.0.11 valid=30s;
        set $upstream app:9000;
        fastcgi_pass $upstream;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
    }

    # Don't serve dotfiles (.env, .git, …).
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
