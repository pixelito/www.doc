version: 2
updates:
  # PHP / Composer (Laravel, Pest, etc.)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "php"
    commit-message:
      prefix: "chore(deps)"

  # JavaScript / npm (React, Inertia, Tailwind)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "js"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # TipTap packages pin exact-version peer deps on their siblings,
      # so they must be bumped in lockstep or npm ci fails with ERESOLVE.
      tiptap:
        patterns:
          - "@tiptap/*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(deps)"

  # Docker (Dockerfile, docker-compose)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(deps)"
