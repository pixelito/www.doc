# Production stack WITH internal self-signed TLS via Caddy.
# Perfect for deploying on local networks (e.g., 192.168.1.10) without a reverse proxy.
# Copy and paste this directly into Komodo or Dockge.
#
#   cp .env.example .env   # set DB_PASSWORD and APP_URL (must start with https://)
#   docker compose -f docker-compose.tls.yml up -d

name: wwwdoc

x-app: &app-image
  image: ghcr.io/pixelito/www.doc-app:latest
  env_file: .env
  environment: &app-env
    APP_ENV: production
    APP_DEBUG: "false"
    DB_CONNECTION: pgsql
    DB_HOST: db
    DB_PORT: "5432"
    DB_DATABASE: ${DB_DATABASE:-wwwdoc}
    DB_USERNAME: ${DB_USERNAME:-wwwdoc}
    REDIS_HOST: redis
    QUEUE_CONNECTION: redis
    SESSION_DRIVER: redis
    CACHE_STORE: redis
    APP_KEY: ${APP_KEY:-}
    APP_URL: ${APP_URL:-}
    BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
  restart: unless-stopped
  logging: &default-logging
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    entrypoint: /bin/sh
    command: >
      -c '
      URL="${APP_URL:-https://localhost}";
      DOMAIN=$${URL#*//};
      DOMAIN=$${DOMAIN%/*};
      echo "{
        default_sni $$DOMAIN
      }
      $$DOMAIN {
        tls internal
        reverse_proxy web:80
        header X-XSS-Protection \"1; mode=block\"
      }" > /etc/caddy/Caddyfile && caddy run --config /etc/caddy/Caddyfile
      '
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    logging: *default-logging

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-wwwdoc}
      POSTGRES_USER: ${DB_USERNAME:-wwwdoc}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-wwwdoc}"]
      interval: 5s
      retries: 10
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging

  app:
    <<: *app-image
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }

  worker:
    <<: *app-image
    command: php artisan queue:work --tries=3 --timeout=300
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }

  scheduler:
    <<: *app-image
    command: php artisan schedule:work
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_started }

  web:
    image: ghcr.io/pixelito/www.doc-web:latest
    volumes:
      - app-storage:/var/www/html/storage:ro
    # No exposed ports here, Caddy securely proxies traffic to this container on port 80
    depends_on: [app]
    restart: unless-stopped
    logging: *default-logging

volumes:
  pgdata: {}
  app-storage: {}
  caddy_data: {}
  caddy_config: {}
