; Production PHP tuning. Opcache on, validation off (code is immutable in the image).
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0

expose_php=0
memory_limit=256M

; Match the asset upload ceiling (10 MB) with headroom for multipart overhead.
upload_max_filesize=12M
post_max_size=16M
